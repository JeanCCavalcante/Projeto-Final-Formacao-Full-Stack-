<mat-spinner></mat-spinner>
} @else {

<mat-tab-group [selectedIndex]="selectedTabIndex()" (selectedTabChange)="onTabChange($event)">
    <mat-tab label="Visão Geral"></mat-tab>
    @for (name of menteeNames(); track name) {
    <mat-tab [label]="name"></mat-tab>
    }
</mat-tab-group>

} @else {
<app-analytics-content [cardData]="displayedCards()" [effortData]="displayedEffort()" [ritmoData]="displayedRitmo()"
