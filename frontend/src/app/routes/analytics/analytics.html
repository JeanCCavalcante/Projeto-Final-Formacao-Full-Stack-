<mat-card class="overview">
    <mat-card-header>
        <mat-card-title-group>
            <mat-card-title>Traffic source</mat-card-title>
        </mat-card-title-group>
    </mat-card-header>
    <mat-card-content>
        <app-donut-chart [trafficSource]="trafficSource"></app-donut-chart>
        <div class="legend">
            <mat-card-title-group class="legend-item">
                <mat-icon svgIcon="ph-light:desktop"></mat-icon>
                <mat-card-title>Desktop</mat-card-title>
                <mat-card-subtitle>{{ trafficSource.desktop + '%' }}</mat-card-subtitle>
            </mat-card-title-group>
            <mat-card-title-group class="legend-item">
                <mat-icon svgIcon="ph-light:device-tablet"></mat-icon>
                <mat-card-title>Tablet</mat-card-title>
                <mat-card-subtitle>{{ trafficSource.tablet + '%' }}</mat-card-subtitle>
            </mat-card-title-group>
            <mat-card-title-group class="legend-item">
                <mat-icon svgIcon="ph-light:phone"></mat-icon>
                <mat-card-title>Phone</mat-card-title>
                <mat-card-subtitle>{{ trafficSource.phone + '%' }}</mat-card-subtitle>
            </mat-card-title-group>
        </div>
    </mat-card-content>
</mat-card>

<mat-card class="overview">
    <mat-card-header>

    </mat-card-header>

    <mat-card-content>
        @if (latestProducts$ | async; as latestProducts) {
        <mat-list>
            @for (product of latestProducts; track product) {
            <mat-list-item>
                <img matListItemAvatar [src]="product.picture" alt="" />
                <span matListItemTitle>{{ product.name }}</span>
                <span matListItemLine>{{ 'Updated' }} {{ product.updatedAt| date: 'mediumDate' }}</span>
                <div matListItemMeta>
                    <button matIconButton type="button">
                        <mat-icon svgIcon="ph-light:dots-three-vertical"></mat-icon>
                    </button>
                </div>
            </mat-list-item>
            <mat-divider></mat-divider>
            }
        </mat-list>
        }
    </mat-card-content>
    <mat-card-actions>
        <button matButton type="button" class="overview-actions">
            <span>View all</span>
            <mat-icon svgIcon="ph-light:arrow-right" style="font-size: 0;"></mat-icon>
        </button>
    </mat-card-actions>
</mat-card>
