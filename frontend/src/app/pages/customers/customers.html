<app-page-heading [pageTitle]="'Customers'"></app-page-heading>

<app-search-box [placeholder]="'Search customer'"></app-search-box>

<mat-card>
    <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="select">
            <th mat-header-cell class="select" *matHeaderCellDef>
                <mat-checkbox (change)="$event ? toggleAllRows() : null"
                    [checked]="selection.hasValue() && isAllSelected()"
                    [indeterminate]="selection.hasValue() && !isAllSelected()" [aria-label]="checkboxLabel()">
                </mat-checkbox>
            </th>
            <td mat-cell class="select" *matCellDef="let row">
                <mat-checkbox (click)="$event.stopPropagation()" (change)="$event ? selection.toggle(row) : null"
                    [checked]="selection.isSelected(row)" [aria-label]="checkboxLabel(row)">
                </mat-checkbox>
            </td>
        </ng-container>
        @for (column of columns; track column) {
        <ng-container [matColumnDef]="column.columnDef">
            <th mat-header-cell *matHeaderCellDef>
                {{column.header}}
            </th>
            <td mat-cell *matCellDef="let row">
                @if (column.header === 'Name') {
                <div class="complex-cell">
                    <img mat-card-avatar [src]="row.avatar" alt=""> {{column.cell(row)}}
                </div>
                }
                @else if (column.header === 'Signed Up') {
                {{column.cell(row) | date: 'mediumDate'}}
                }
                @else {
                {{column.cell(row)}}
                }
            </td>
        </ng-container>
        }
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="selection.toggle(row)"></tr>
    </table>
    <mat-paginator [length]="5" [pageSize]="5" [pageSizeOptions]="[5, 10, 20]" aria-label="Select page of customers">
    </mat-paginator>
</mat-card>
