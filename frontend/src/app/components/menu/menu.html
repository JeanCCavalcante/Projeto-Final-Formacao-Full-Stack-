@if (loggedAccount$ | async; as loggedAccount) {
<img [src]="loggedAccount.avatar" alt="" [matMenuTriggerFor]="menu" class="menu-avatar" (click)="onClickingAvatar()">
<mat-menu class="user-menu" #menu="matMenu">
    <hgroup>
        <h6 class="user-name">{{ loggedAccount.firstName }} {{ loggedAccount.lastName }}</h6>
        <p class="user-email">{{ loggedAccount.email }}</p>
    </hgroup>
    <mat-divider></mat-divider>
    <button mat-menu-item type="button" routerLink="/settings" class="menu-button">
        <mat-icon class="menu-icon" svgIcon="ph-light:gear-six"></mat-icon>
        <span>Configurações</span>
    </button>
    <button mat-menu-item type="button" routerLink="/account" class="menu-button">
        <mat-icon class="menu-icon" svgIcon="ph-light:user-circle"></mat-icon>
        <span>Perfil</span>
    </button>
    <button mat-menu-item type="button" class="menu-button">
        <mat-icon class="menu-icon" svgIcon="ph-light:sign-out"></mat-icon>
        <span>Sair</span>
    </button>
</mat-menu>
}
